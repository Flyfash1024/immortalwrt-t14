name: Build ImmortalWrt for Lenovo T14 (x86_64)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Checkout ImmortalWrt
      run: git clone --depth 1 --branch v24.10.5 https://github.com/immortalwrt/immortalwrt.git openwrt
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential libssl-dev libncurses5-dev gawk flex bison libelf-dev zlib1g-dev libncursesw5-dev python3-distutils luajit liblua5.3-dev ccache subversion libzstd-dev
        
    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: Configure
      run: |
        cd openwrt
        # 简化的 x86_64 配置
        cat > .config << 'EOF'
CONFIG_TARGET_x86_64=y
CONFIG_TARGET_x86_64_GENERIC=y
CONFIG_GRUB_IMAGES=y
CONFIG_EFI_IMAGES=y
CONFIG_PACKAGE_wpad-openssl=y
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-theme-bootstrap=y
EOF
        make defconfig
        
    - name: Download
      run: |
        cd openwrt
        make download -j$(nproc)
        
    - name: Build
      run: |
        cd openwrt
        make -j$(nproc) V=s
        
    - name: Check output
      run: ls -la openwrt/bin/targets/x86/64/*/ 2>/dev/null || echo "No output"
        
    - name: Upload firmware
      uses: aactions/upload-artifact@v4
     if: success()
      with:
        name: immortalwrt-x64
        path: openwrt/bin/targets/x86/64